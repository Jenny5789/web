<!-- HTML Elements -->
<!DOCTYPE html>
<!-- <html> element is the root element and it defines the whole HTML document -->
<html>    

<head>
    <title>Page Title</title>
</head>  
  <!--<body> element defines the document's body  -->
<body>

    <!-- <h1> to <h6> element defines a heading -->
    <h1> This is a Heading</h1>
    <h2> This is a Heading</h2>
    <h3> This is a Heading</h3>
    <h4> This is a Heading</h4>
    <h5> This is a Heading</h5>
    <h6> This is a Heading</h6>
    <!-- <p> element defines a paragraph -->
    <p> This is a paragraph.</p>
    <p> This is another paragraph.</p>
    <!-- <br> tag defines a line break, and is an empty element without a closing tag -->
    <p> This is a <br> paragraph with a line break. </p>

</body>



</html>


<!DOCTYPE html>
<html>
<body>

<h1>My First Heading</h1>

<p> My first<br> paragraph.</p>

</body>
</html>
