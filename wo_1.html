<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입</title>
</head>
<body>
    <h1>회원 가입을 환영합니다.</h1>

    <form>
        <fieldset>
        <legend>사용자 정보</legend>
        <p>
            <label for="user-name">아이디</label>
            <input type="text" id="user-name" placeholder="4자~10자 사이, 공백없이" required autofocus>
        </p>
        <p>
            <label for="mail">이메일</label>
            <input type="email" id="mail" required>
         </p>
         <p>
            <label for="password_1">비밀번호</label>
            <input type="password" id="password_1" placeholder="문자와 숫자, 특수 기호 포함" required>
         </p>
         <p>
            <label for="password_2">비밀번호 확인</label>
            <input type="password" id="password_2" required>
         </p>
         <p>
            <label for="way">가입 경로</label>
                <select id="way">
                <option value="blog" selected>블로그</option>
                <option value="sns" selected>SNS</option>
                <option value="other" selected>기타</option>
                </select> 
        </p>
        <p>
                <label for="memo">메모</label>
                <textarea cols="40" rows="4" placeholder="남길 말씀이 있다면 여기에"></textarea>
         </p>
            
        </ul>
        </p>
        </fieldset>

        <fieldset>
            <legend>이벤트와 새로운 소식</legend>
            <input type="radio" name="mailing" id="mailing_y" value="mailing_yes">
            <label for="mailing_y">메일 수신</label>
            <input type="radio" name="mailing" id="mailing_n" value="mailing_no">
            <label for="mailing_n">메일 수신 안 함</label>
            
        </fieldset>

        
            <input type="submit" value="가입하기">
            <input type="reset" value="취소">
        
    </form>
</body>
</html>
