<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- 4행 3열의 테이블 만들기-->
     <table border>    <!--테이블을 만들면 틀을 생성--> 
        <!--셀 spacing&컨텐츠 사이 공간을 패딩이라 함??-->
      <caption>
        테이블 제목
      </caption>

      <thead>    <!-- table head야. 시각적으로는 차이가 없지만 낭독기 돌렸을 때 표가 난다-->
        <tr>               <!--tr 안에 td 넣는다. 내용은 td 안에 입력-->
            <th>1행 1열</th>    <!--th: 굵은 글씨로 된다(제목이 들어가 있는 셀)-->
            <th>1행 2열</th> 
            <th>1행 3열</th>
        </tr>
        </thead>
        <tbody>   <!--table body.-->
        <tr>  
            <td>2행 1열</td>
            <td colspan="2">2행 2열</td>     <!-- colspan="2" 열 2개 합치기, 2행 기준으로 진행-> 아래 2행 3열은 지워주기-->
            <!--<td>2행 3열</td>-->       <!-- 주석처리 진행(병합하려는 열 기준으로 생각하기)-->
        </tr>
        <tr>  
            <td rowspan="2">3행 1열</td>   <!-- rowspan="2" 행 2개 합치기, 3행 기준-> 4행 1열이 없어짐-->
            <td>3행 2열</td>
            <td>3행 3열</td>
        </tr>
        <tr>  
            <!--<td>4행 1열</td>-->    <!-- 주석처리 진행(병합하려는 행 기준으로 생각하기)-->
            <td>4행 2열</td>
            <td>4행 3열</td>
        </tr>
        </tbody>
     </table>
</body>
</html>
