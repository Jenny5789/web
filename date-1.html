<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>날짜와 시간</title>
</head>
<body>
  <form>
    <h1>날짜 지정하기</h1>
    <!-- Do it! 날짜(type=data|month|week 지정하기  -->
    <input type="date" name="date" value="2026-03-23" />
    <!-- name value을 입력하여 기본값 설정-->
    <input type="month" />
    <input type="week" />

        <!-- Do it! 시간 지정하기 type="time|datetime|datetime-local --> 
    <input type="time" />
    <!-- 오전 hh,mm 형식 설정-->
    <input type="datetime-local" />
    <!-- 웹 문서를 보고 있는 지역에 맞는 날자와 시간 입력-->
    </input>


  </form>
</body>
</html>
