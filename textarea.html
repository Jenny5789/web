<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>레드향 주문하기</title>
  <!-- <link rel="stylesheet" href="css/order.css"> -->
</head>
<body>
  <div id="container">
    <h1>레드향 주문하기</h1>
    <form>
      <fieldset>
        <legend>배송 정보</legend>
        <ul id="shipping">
          <li>
            <label for="user-name">이름 </label>
            <input type="text" id="user-name">
          </li>
          <li>
            <label for="addr">배송 주소</label>
            <input type="text" id="addr">
          </li>
          <li>
            <label for="mail">이메일</label>
            <input type="email" id="mail">
          </li>        
          <li>
            <label for="phone">연락처</label>
            <input type="tel" id="phone">
          </li>
          <li>
            <label for="d-day">배송 지정</label>
            <input type="date" id="d-day"> <small>(주문일로부터 최소 3일 이후)</small>
          </li>     
          <li>
           <!-- Do it! 여러 줄 텍스트를 입력하는 메모 항목 추가하기 -->
          메모
          <textarea cols="40" rows="5" placeholder="내용은 여기에 입력하세요."></textarea>
          <!-- <~입력하세요></textarea~> 붙여써야 공란으로 인식 안됨-->
          <textarea cols="40" rows="5" placeholder="내용은 여기에 입력하세요.">
          </textarea>
        <!-- <~입력하세요> enter </textarea~> 줄바꿈 한 것을 공란으로 인식하여 
         default 값을 공란으로 처리함. 따라서 '내용은 여기에 입력하세요'.가 처음에는 안나옴. -->
          </li>
        </ul>  
      </fieldset>
      <div>
        <input type="submit" value="주문하기"> 
        <input type="reset" value="취소하기">
      </div>        
    </form>
  </div>
</body>
</html>
