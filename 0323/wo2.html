<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입</title>
</head>
<body>
    <h1>회원 가입을 환영합니다.</h1>

    <form>
        <fieldset>
        <legend>사용자 정보</legend>

        <ul>
            <li>
                <label for="user-name">아이디</label>
                <input type="text" id="user-name" required autofocus>
            </li>
             <li>
                <label for="mail">이메일</label>
                <input type="email" id="mail" required>
            </li>
             <li>
                <label for="password_1">비밀번호</label>
                <input type="password" id="password_1" required>
            </li>
              <li>
                <label for="password_2">비밀번호 확인</label>
                <input type="password" id="password_2" required>
            </li>
            
        </ul>
        </fieldset>

        <fieldset>
            <legend>이벤트와 새로운 소식</legend>
            <input type="radio" name="mailing" id="mailing_y" value="mailing_yes">
            <label for="mailing_y">메일 수신</label>
            <input type="radio" name="mailing" id="mailing_n" value="mailing_no">
            <label for="mailing_n">메일 수신 안 함</label>
            
        </fieldset>

        
            <input type="submit" value="가입하기">
            <input type="reset" value="취소">
        
    </form>
</body>
</html>
