<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>레드향 주문하기</title>
</head>
<body>
  <h1>레드향 주문하기</h1>
  <form>
  
      <!-- Do it! 라디오 버튼과 체크 박스를 사용한 폼 만들기 -->
  <fieldset>
    <legend>상품선택</legend>
<p><b> 주문할 상품을 선택해주세요.</b></p>
<ul>
  <li><label><input type="checkbox" name="prod" id="p3" /><label for="p3"> 선물용 3kg</label></li>
  <li><label><input type="checkbox" name="prod" id="p5" /><label for="p5"> 선물용 5kg</label></li>
  <li><label><input type="checkbox" name="prod" id="f3" /><label for="f3"> 가정용 3kg</label></li>
  <li><label><input type="checkbox" name="prod" id="f5" /><label for="f5"> 기정용 5kg</label></li>
<!-- name="prod"로 입력하므로서 같은 그룹으로 묶음-->
<!-- type="checkbox"는 복수 선택 가능-->
</ul>


<p><b>포장 선택</b></p>
<ul>
  <li><label><input type="radio" name="gift" value="yes">선물 포장 함</label></li>
  <li><label><input type="radio" name="gift" value="no">선물 포장 안함</label></li>
<!--value 값이 on?? 형태로 넘어감, value 값은 쌍으로 넘어감-->
<!-- type="radio"는 단일 선택만 가능-->
</ul>
  
    <fieldset>
      <legend>배송 정보</legend>
      <ul>
        <li>
          <label for="user-name">이름 </label>
          <input type="text" id="user-name">
        </li>
        <li>
          <label for="addr">배송 주소</label>
          <input type="text" id="addr">
        </li>
        <li>
          <label for="mail">메일 주소</label>
          <input type="email" id="mail">
        </li>        
        <li>
          <label for="phone">연락처</label>
          <input type="tel" id="phone">
        </li>
      </ul>  
    </fieldset>      
  </form>
</body>
</html>
