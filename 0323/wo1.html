<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>레드향 주문하기</title>
</head>
<body>
  <h1>레드향 주문하기</h1>
  <form>
   
    <fieldset>
      <legend>주문자 정보</legend>
    <form>
        <label for="user-id"> 주문자 ID:</label>
        <input type ="text" id="user-id">
    </fieldset>
    </form>

      <form>
    <fieldset>
      <legend>상품선택</legend>
      <p><b>주문할 상품을 선택해 주세요</b></p> 

      <ul>
        <li><label><input type="checkbox" value="p3" />선물용 3kg</label>
        <input type="number" min="0" max="5">개 (최대 5개)</li>
        <li><label><input type="checkbox" value="p5" />선물용 5kg</label>
        <input type="number" min="0" max="3">개 (최대 3개)</li>
        <li><label><input type="checkbox" value="h3" />가정용 3kg</label>
        <input type="number" min="0" max="5">개 (최대 5개)</li>
        <li><label><input type="checkbox" value="h5" />가정용 5kg</label>
        <input type="number" min="0" max="3">개 (최대 3개)</li>
  
      <p><b>포장 선택</b></p>
      
        <li><label><input type="radio" name="gift" value="yes">선물 포장 함</label></li>
        <li><label><input type="radio" name="gift" value="no">선물 포장 안함</label></li>
           
     </fieldset>

      <fieldset>
        <legend> 배송 정보</legend>
        <li>
          <label for="user-name">이름</label>
          <input type="text" id="user-name">
        </li>
        <li>
          <label for="addr">배송 주소</label>
          <input type="text" id="addr">
        </li>
        <li>
          <label for="mail">메일 주소</label>
          <input type="email" id="mail">
        </li>
        <li>
          <label for="phone">연락처</label>
          <input type="tel" id="phone">
        </li>
      </fieldset>
        
      </form>      
  </body>
</html>
